name: Release

# Cut a release by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# or run manually from the Actions tab, supplying the tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: build binaries & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Zig cross-compiles every target from this one Linux runner, using the
      # exact Zig 0.16 the flake pins.
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Resolve version
        id: ver
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: Build and package all targets
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          mkdir -p dist

          # zig-target : release-archive-label
          targets="
            x86_64-linux-musl:x86_64-linux
            aarch64-linux-musl:aarch64-linux
            x86_64-macos:x86_64-macos
            aarch64-macos:aarch64-macos
            x86_64-windows-gnu:x86_64-windows
            aarch64-windows-gnu:aarch64-windows
          "
          for pair in $targets; do
            zig_t="${pair%%:*}"
            label="${pair##*:}"
            echo "::group::$label ($zig_t)"
            nix develop --command zig build \
              -Dtarget="$zig_t" -Doptimize=ReleaseFast --prefix "out/$label"
            case "$zig_t" in
              *windows*)
                zip -j "dist/zrk-$version-$label.zip" "out/$label/bin/zrk.exe"
                ;;
              *)
                tar czf "dist/zrk-$version-$label.tar.gz" -C "out/$label/bin" zrk
                ;;
            esac
            echo "::endgroup::"
          done

          ( cd dist && sha256sum * > SHA256SUMS.txt )
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: dist/*
          generate_release_notes: true

      - name: Update homebrew-tap formula
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"

          sha_aarch64_macos=$(grep "zrk-$version-aarch64-macos.tar.gz" dist/SHA256SUMS.txt | awk '{print $1}')
          sha_x86_64_macos=$(grep  "zrk-$version-x86_64-macos.tar.gz"  dist/SHA256SUMS.txt | awk '{print $1}')
          sha_aarch64_linux=$(grep "zrk-$version-aarch64-linux.tar.gz" dist/SHA256SUMS.txt | awk '{print $1}')
          sha_x86_64_linux=$(grep  "zrk-$version-x86_64-linux.tar.gz"  dist/SHA256SUMS.txt | awk '{print $1}')

          eval "$(ssh-agent -s)"
          echo "$DEPLOY_KEY" | ssh-add -
          mkdir -p ~/.ssh
          ssh-keyscan github.com >> ~/.ssh/known_hosts

          git clone git@github.com:zoxy-io/homebrew-tap.git homebrew-tap
          cd homebrew-tap

          ruby_file="Formula/zrk.rb"
          old_version=$(grep -oP 'v\K[0-9]+\.[0-9]+\.[0-9]+' "$ruby_file" | head -1)

          sed -i "s|zrk-$old_version-aarch64-macos|zrk-$version-aarch64-macos|g" "$ruby_file"
          sed -i "s|zrk-$old_version-x86_64-macos|zrk-$version-x86_64-macos|g"   "$ruby_file"
          sed -i "s|zrk-$old_version-aarch64-linux|zrk-$version-aarch64-linux|g" "$ruby_file"
          sed -i "s|zrk-$old_version-x86_64-linux|zrk-$version-x86_64-linux|g"   "$ruby_file"

          # Replace sha256 values in order: aarch64-macos, x86_64-macos, aarch64-linux, x86_64-linux
          python3 - "$ruby_file" "$sha_aarch64_macos" "$sha_x86_64_macos" "$sha_aarch64_linux" "$sha_x86_64_linux" <<'EOF'
          import sys, re
          path, *shas = sys.argv[1:]
          text = open(path).read()
          it = iter(shas)
          result = re.sub(r'sha256 "[0-9a-f]+"', lambda m: f'sha256 "{next(it)}"', text)
          open(path, 'w').write(result)
          EOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add "$ruby_file"
          git commit -m "zrk: update to v$version"
          git push
