name: Release

# Cut a release by pushing a version tag:
#   git tag v0.1.0 && git push origin v0.1.0
# or run manually from the Actions tab, supplying the tag.
on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    name: build binaries & publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      # Zig cross-compiles every target from this one Linux runner, using the
      # exact Zig 0.16 the flake pins.
      - uses: cachix/install-nix-action@v30
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Resolve version
        id: ver
        run: |
          ref="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$ref" >> "$GITHUB_OUTPUT"
          echo "version=${ref#v}" >> "$GITHUB_OUTPUT"

      - name: Build and package all targets
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          mkdir -p dist

          # zig-target : release-archive-label
          targets="
            x86_64-linux-musl:x86_64-linux
            aarch64-linux-musl:aarch64-linux
            x86_64-macos:x86_64-macos
            aarch64-macos:aarch64-macos
            x86_64-windows-gnu:x86_64-windows
            aarch64-windows-gnu:aarch64-windows
          "
          for pair in $targets; do
            zig_t="${pair%%:*}"
            label="${pair##*:}"
            echo "::group::$label ($zig_t)"
            nix develop --command zig build \
              -Dtarget="$zig_t" -Doptimize=ReleaseFast --prefix "out/$label"
            case "$zig_t" in
              *windows*)
                zip -j "dist/zrk-$version-$label.zip" "out/$label/bin/zrk.exe"
                ;;
              *)
                tar czf "dist/zrk-$version-$label.tar.gz" -C "out/$label/bin" zrk
                ;;
            esac
            echo "::endgroup::"
          done

          ( cd dist && sha256sum * > SHA256SUMS.txt )
          ls -la dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: dist/*
          generate_release_notes: true

      - name: Update Homebrew formula
        env:
          HOMEBREW_TAP_DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          version="${{ steps.ver.outputs.version }}"
          tag="${{ steps.ver.outputs.tag }}"

          sha_aarch64_macos=$(grep "zrk-$version-aarch64-macos.tar.gz" dist/SHA256SUMS.txt | awk '{print $1}')
          sha_x86_64_macos=$(grep  "zrk-$version-x86_64-macos.tar.gz"  dist/SHA256SUMS.txt | awk '{print $1}')
          sha_aarch64_linux=$(grep "zrk-$version-aarch64-linux.tar.gz" dist/SHA256SUMS.txt | awk '{print $1}')
          sha_x86_64_linux=$(grep  "zrk-$version-x86_64-linux.tar.gz"  dist/SHA256SUMS.txt | awk '{print $1}')

          mkdir -p ~/.ssh
          echo "$HOMEBREW_TAP_DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes"

          git clone git@github.com:zoxy-io/homebrew-tap.git
          cd homebrew-tap

          cat > Formula/zrk.rb << FORMULA
          class Zrk < Formula
            desc "Constant-throughput HTTP load generator in Zig"
            homepage "https://zoxy.io/zrk"
            license "MIT"

            livecheck do
              url "https://github.com/zoxy-io/zrk"
              strategy :github_latest
            end

            on_macos do
              on_arm do
                url "https://github.com/zoxy-io/zrk/releases/download/$tag/zrk-$version-aarch64-macos.tar.gz"
                sha256 "$sha_aarch64_macos"
              end
              on_intel do
                url "https://github.com/zoxy-io/zrk/releases/download/$tag/zrk-$version-x86_64-macos.tar.gz"
                sha256 "$sha_x86_64_macos"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/zoxy-io/zrk/releases/download/$tag/zrk-$version-aarch64-linux.tar.gz"
                sha256 "$sha_aarch64_linux"
              end
              on_intel do
                url "https://github.com/zoxy-io/zrk/releases/download/$tag/zrk-$version-x86_64-linux.tar.gz"
                sha256 "$sha_x86_64_linux"
              end
            end

            def install
              bin.install "zrk"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/zrk --version")
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "zrk: update to $version"
          git push
